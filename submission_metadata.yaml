# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture design discussion, code generation, debugging,
  and iteration on the ranking pipeline (Stages A-F: hard filters, skill/title
  matching, semantic similarity, behavioral signal scoring, multiplicative
  score fusion, and reasoning generation). All design decisions — including
  the choice of multiplicative over additive score fusion, and the specific
  honeypot/disqualifier rules — were made and validated by the team based on
  the job description and dataset, then implemented and iterated on with
  Claude's assistance. No candidate data was sent to any external LLM API
  during the ranking step itself; ranking runs fully offline using local
  TF-IDF or sentence-transformers embeddings.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Six-stage pipeline: (A) hard filters flag honeypot/fabricated profiles and
  JD-stated disqualifiers (pure-research-only, pure-consulting-only,
  non-NLP-only, title-chasers, senior-but-not-coding); (B) rule-based skill
  and title matching, with a discount (not a hard cutoff) for non-technical
  titles to catch keyword-stuffer traps; (C) semantic similarity between the
  JD and each candidate's career history (TF-IDF or sentence-transformers);
  (D) behavioral signal scoring using last-active recency, recruiter response
  rate/speed, interview completion, GitHub activity score, and platform skill
  assessments; (E) multiplicative score fusion — behavioral signals scale
  (not add to) the skill+semantic score, since the JD explicitly states
  unavailable-but-qualified candidates should be "down-weighted
  appropriately," which an additive formula does not achieve; (F) grounded,
  per-candidate reasoning generation referencing real profile fields. Runtime
  is approximately 70-85 seconds for the full 100,000-candidate dataset on a
  single CPU core, well within the 5-minute budget.

